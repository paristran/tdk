<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 36" fill="none">
  <defs>
    <linearGradient id="m" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <g transform="translate(2,2)">
    <rect width="32" height="32" rx="7" fill="url(#m)"/>
    <!--
      Stylized interlocking TDK:
      The T's horizontal bar spans the top.
      The T's vertical stem goes down the center.
      On the left of the stem, a D-bowl shape curves around.
      On the right of the stem, the K's two diagonals diverge.
      The T-bar and K-diagonals share the same angles, creating visual harmony.
    -->
    <!-- T horizontal bar -->
    <rect x="4" y="7" width="24" height="3.5" rx="1.75" fill="#f5f5f7"/>
    <!-- T vertical stem -->
    <rect x="13.75" y="7" width="3.5" height="19" rx="1.75" fill="#f5f5f7"/>
    <!-- D bowl -->
    <path d="M13.75 14.5 A5.5 5.5 0 0 0 13.75 25.5" stroke="#f5f5f7" stroke-width="3" fill="none" opacity=".4" stroke-linecap="round"/>
    <!-- K upper diagonal -->
    <line x1="20" y1="16.5" x2="27" y2="10.5" stroke="#f5f5f7" stroke-width="3" stroke-linecap="round"/>
    <!-- K lower diagonal -->
    <line x1="20" y1="16.5" x2="27" y2="22.5" stroke="#f5f5f7" stroke-width="3" stroke-linecap="round" opacity=".7"/>
  </g>
  <text x="44" y="26" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="22" font-weight="600" letter-spacing=".06em" fill="#f5f5f7">TDK</text>
</svg>
